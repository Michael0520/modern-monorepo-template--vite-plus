packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  # React
  react: ^19.2.4
  react-dom: ^19.2.4
  "@types/react": ^19.2.14
  "@types/react-dom": ^19.2.3

  # TanStack
  "@tanstack/react-start": ^1.167.8
  "@tanstack/react-router": ^1.168.4

  # Vite plugins
  "@vitejs/plugin-react": ^6.0.1
  "@tailwindcss/vite": ^4.2.2

  # UI (shadcn / Tailwind)
  "@base-ui/react": ^1.3.0
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  lucide-react: ^1.7.0
  tailwind-merge: ^3.5.0
  tailwindcss: ^4.2.2
  tw-animate-css: ^1.4.0

  # Server
  nitro: 3.0.260311-beta

  # Tooling
  "@types/node": ^24.12.0
  typescript: ^6.0.2
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
