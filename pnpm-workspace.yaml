packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@base-ui/react": ^1.3.0
  "@tailwindcss/vite": ^4.2.2
  "@tanstack/react-router": ^1.167.5

  # TanStack
  "@tanstack/react-start": ^1.166.17
  "@types/node": ^24
  "@types/react": ^19.2.14
  "@types/react-dom": ^19.2.3

  # Vite plugins
  "@vitejs/plugin-react": ^6.0.1
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  lucide-react: ^0.577.0

  # React
  react: ^19.2.4
  react-dom: ^19.2.4
  shadcn: ^4.0.8
  tailwind-merge: ^3.5.0

  # Tailwind & shadcn
  tailwindcss: ^4.2.2
  tw-animate-css: ^1.4.0
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
