name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Install vp
        run: npm install -g vite-plus

      - name: Install dependencies
        run: vp install

      - name: Format
        run: vp fmt --check

      - name: Lint
        run: vp lint

      - name: Test
        run: vp run test -r

      - name: Build
        run: vp run build -r
